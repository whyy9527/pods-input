<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PodsInput Web Racer</title>
  <style>
    :root { color-scheme: dark; font-family: ui-rounded, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #07111f; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud { position: fixed; inset: 24px 24px auto; display: flex; justify-content: space-between; pointer-events: none; }
    .panel { padding: 12px 16px; border: 1px solid #ffffff2b; border-radius: 14px; background: #07111fbd; backdrop-filter: blur(12px); }
    #status[data-connected="true"] { color: #72f1b8; }
    kbd { padding: 2px 7px; border: 1px solid #ffffff38; border-radius: 6px; background: #ffffff12; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="panel"><strong>PodsInput Web Racer</strong><br><span id="status">Connecting…</span></div>
    <div class="panel">Tilt your head to steer · <kbd>←</kbd> <kbd>→</kbd> fallback<br><span id="telemetry">roll 0.0°</span></div>
  </div>
  <script>
    const canvas = document.querySelector('#game');
    const context = canvas.getContext('2d');
    const status = document.querySelector('#status');
    const telemetry = document.querySelector('#telemetry');
    let width = 0, height = 0, carX = 0, target = 0, roadOffset = 0;
    const keys = new Set();

    function resize() {
      width = canvas.width = innerWidth * devicePixelRatio;
      height = canvas.height = innerHeight * devicePixelRatio;
      carX ||= width / 2;
    }
    addEventListener('resize', resize); resize();
    addEventListener('keydown', event => keys.add(event.key));
    addEventListener('keyup', event => keys.delete(event.key));

    function connect() {
      const socket = new WebSocket('ws://127.0.0.1:17604');
      socket.onopen = () => { status.textContent = 'AirPods stream connected'; status.dataset.connected = 'true'; };
      socket.onclose = () => { status.textContent = 'Waiting for PodsInput…'; status.dataset.connected = 'false'; setTimeout(connect, 1000); };
      socket.onmessage = event => {
        const message = JSON.parse(event.data);
        if (message.protocolVersion !== 1 || message.type !== 'motion') return;
        const degrees = message.orientation.roll * 180 / Math.PI;
        const deadZone = 3;
        target = Math.abs(degrees) < deadZone ? 0 : Math.max(-1, Math.min(1, degrees / 24));
        telemetry.textContent = `roll ${degrees.toFixed(1)}° · steering ${target.toFixed(2)}`;
      };
    }
    connect();

    function frame() {
      const keyboard = (keys.has('ArrowRight') ? 1 : 0) - (keys.has('ArrowLeft') ? 1 : 0);
      const steering = keyboard || target;
      carX += steering * width * 0.009;
      const roadLeft = width * 0.18, roadRight = width * 0.82;
      carX = Math.max(roadLeft + 30, Math.min(roadRight - 30, carX));
      roadOffset = (roadOffset + height * 0.012) % (height * 0.16);

      context.fillStyle = '#0c6b46'; context.fillRect(0, 0, width, height);
      context.fillStyle = '#263240'; context.fillRect(roadLeft, 0, roadRight - roadLeft, height);
      context.strokeStyle = '#f7f0bb'; context.lineWidth = width * 0.008; context.setLineDash([height * 0.08, height * 0.08]);
      context.lineDashOffset = roadOffset; context.beginPath(); context.moveTo(width / 2, 0); context.lineTo(width / 2, height); context.stroke();
      context.setLineDash([]); context.fillStyle = '#ff4f64';
      context.save(); context.translate(carX, height * 0.78); context.rotate(steering * 0.14);
      context.fillRect(-width * 0.028, -height * 0.055, width * 0.056, height * 0.11);
      context.fillStyle = '#b9e7ff'; context.fillRect(-width * 0.019, -height * 0.035, width * 0.038, height * 0.027); context.restore();
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
