<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PodsInput Tilt Rush</title>
  <style>
    :root { color-scheme: dark; font-family: ui-rounded, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #87d9ff; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .topbar { position: fixed; z-index: 2; inset: 20px 20px auto; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
    .panel { padding: 11px 15px; border: 1px solid #ffffff70; border-radius: 14px; background: #11243dcc; box-shadow: 0 8px 30px #08213c35; backdrop-filter: blur(12px); }
    #status[data-connected="true"] { color: #72f1b8; }
    button { min-height: 40px; padding: 8px 13px; border: 1px solid #ffffff55; border-radius: 9px; background: #ffffff18; color: inherit; font: inherit; font-weight: 700; cursor: pointer; pointer-events: auto; }
    button:hover { background: #ffffff2b; transform: translateY(-1px); }
    .actions { display: flex; gap: 8px; margin-top: 9px; }
    .menu { position: fixed; z-index: 1; inset: 0; display: grid; place-items: center; background: #07172766; }
    .menu[hidden] { display: none; }
    .card { width: min(440px, calc(100vw - 40px)); padding: 30px; border: 1px solid #ffffff80; border-radius: 24px; background: #10233eee; box-shadow: 0 24px 80px #06142666; text-align: center; }
    .card h1 { margin: 0 0 8px; font-size: clamp(38px, 7vw, 64px); letter-spacing: -0.05em; }
    .card p { color: #d9eaff; line-height: 1.55; }
    #start { min-width: 180px; padding: 12px 20px; background: #ff496d; border-color: #ffb3c1; font-size: 17px; }
    kbd { padding: 2px 7px; border: 1px solid #ffffff42; border-radius: 6px; background: #ffffff12; }
    #telemetry { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Tilt Rush racing game"></canvas>
  <div class="topbar">
    <div class="panel"><strong>Tilt Rush</strong><br><span id="status">Connecting…</span><div class="actions"><button id="center" type="button">Center</button><button id="fullscreen" type="button">Full screen</button></div></div>
    <div class="panel" id="telemetry">Score 0 · ♥♥♥</div>
  </div>
  <div class="menu" id="menu">
    <div class="card">
      <h1>Tilt Rush</h1>
      <p id="message">Tilt to carve. Flick your head up to jump traffic.<br>Survive longer as the road speeds up.</p>
      <p><kbd>←</kbd> <kbd>→</kbd> steer · <kbd>Space</kbd> jump · <kbd>F</kbd> fullscreen</p>
      <button id="start" type="button">Start run</button>
    </div>
  </div>
  <script>
    const canvas = document.querySelector('#game');
    const context = canvas.getContext('2d');
    const status = document.querySelector('#status');
    const telemetry = document.querySelector('#telemetry');
    const centerButton = document.querySelector('#center');
    const fullscreenButton = document.querySelector('#fullscreen');
    const menu = document.querySelector('#menu');
    const message = document.querySelector('#message');
    const startButton = document.querySelector('#start');
    const keys = new Set();
    const lanes = [350, 500, 650];
    const spawnPattern = [1, 0, 2, 1, 2, 0, 1, 0, 2];
    let width = 0;
    let height = 0;
    let scale = 1;
    let socket;
    let tilt = 0;
    var pitchDelta = 0;
    let pitchDeltaRange = { min: 0, max: 0 };
    const pitchHistory = [];
    let testingMode = false;
    let lastFrame = performance.now();

    const state = {
      mode: 'ready', score: 0, best: Number(localStorage.getItem('podsinput-best') || 0), lives: 3, clears: 0, jumps: 0,
      elapsed: 0, speed: 260, spawnTimer: 0.8, spawnIndex: 0, roadOffset: 0,
      player: { x: 500, y: 590, width: 44, height: 108, lean: 0, jumpRemaining: 0, jumpCooldown: 0, invulnerable: 0 }, obstacles: [], particles: []
    };

    function resize() {
      width = canvas.width = innerWidth * devicePixelRatio;
      height = canvas.height = innerHeight * devicePixelRatio;
      scale = Math.min(width / 1000, height / 700);
    }
    addEventListener('resize', resize);
    resize();

    function resetGame() {
      Object.assign(state, { mode: 'playing', score: 0, lives: 3, clears: 0, jumps: 0, elapsed: 0, speed: 260, spawnTimer: 0.8, spawnIndex: 0, roadOffset: 0, obstacles: [], particles: [] });
      Object.assign(state.player, { x: 500, y: 590, lean: 0, jumpRemaining: 0, jumpCooldown: 0, invulnerable: 0 });
      menu.hidden = true;
      render();
    }

    function finishGame() {
      state.mode = 'gameover';
      state.best = Math.max(state.best, Math.floor(state.score));
      localStorage.setItem('podsinput-best', state.best);
      message.innerHTML = `Run over — <strong>${Math.floor(state.score)}</strong> points.<br>Best score: ${state.best}`;
      startButton.textContent = 'Race again';
      menu.hidden = false;
    }

    function spawnObstacle() {
      const lane = lanes[spawnPattern[state.spawnIndex++ % spawnPattern.length]];
      state.obstacles.push({ x: lane, y: -90, width: 58, height: 98, hue: (state.spawnIndex * 67) % 360 });
    }

    function overlaps(a, b) {
      return Math.abs(a.x - b.x) < (a.width + b.width) * 0.43 && Math.abs(a.y - b.y) < (a.height + b.height) * 0.43;
    }

    function crash(obstacle) {
      state.lives -= 1;
      state.player.invulnerable = 1.2;
      for (let i = 0; i < 18; i++) state.particles.push({ x: state.player.x, y: state.player.y, vx: (i % 6 - 2.5) * 55, vy: -40 - (i % 4) * 25, life: 0.55 });
      obstacle.hit = true;
      if (state.lives <= 0) finishGame();
    }

    function jump() {
      if (state.mode !== 'playing' || state.player.jumpRemaining > 0 || state.player.jumpCooldown > 0) return;
      state.player.jumpRemaining = 0.85;
      state.player.jumpCooldown = 1.1;
      state.jumps += 1;
    }

    function update(dt) {
      if (state.mode !== 'playing') return;
      state.elapsed += dt;
      state.score += dt * (12 + state.speed / 55);
      state.speed = Math.min(560, 260 + state.elapsed * 10);
      state.roadOffset = (state.roadOffset + state.speed * dt) % 150;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnObstacle();
        state.spawnTimer += Math.max(0.52, 1.05 - state.elapsed * 0.008);
      }

      const keyboard = (keys.has('ArrowRight') ? 1 : 0) - (keys.has('ArrowLeft') ? 1 : 0);
      const steering = keyboard || tilt;
      state.player.x = Math.max(290, Math.min(710, state.player.x + steering * 330 * dt));
      state.player.lean += (steering - state.player.lean) * Math.min(1, dt * 8);
      state.player.invulnerable = Math.max(0, state.player.invulnerable - dt);
      state.player.jumpRemaining = Math.max(0, state.player.jumpRemaining - dt);
      state.player.jumpCooldown = Math.max(0, state.player.jumpCooldown - dt);
      const jumpProgress = state.player.jumpRemaining > 0 ? 1 - state.player.jumpRemaining / 0.85 : 0;
      const jumpHeight = state.player.jumpRemaining > 0 ? Math.sin(jumpProgress * Math.PI) * 90 : 0;
      state.player.jumpHeight = jumpHeight;

      for (const obstacle of state.obstacles) {
        obstacle.y += state.speed * dt;
        if (!obstacle.hit && !obstacle.jumped && overlaps(state.player, obstacle)) {
          if (jumpHeight > 24) {
            if (!obstacle.jumped) { obstacle.jumped = true; state.clears += 1; state.score += 25; }
          } else if (state.player.invulnerable === 0) {
            crash(obstacle);
          }
        }
      }
      state.obstacles = state.obstacles.filter(obstacle => obstacle.y < 790 && !obstacle.hit);
      for (const particle of state.particles) {
        particle.x += particle.vx * dt; particle.y += particle.vy * dt; particle.life -= dt;
      }
      state.particles = state.particles.filter(particle => particle.life > 0);
    }

    function drawCar(car, color, alpha = 1) {
      context.save(); context.globalAlpha = alpha; context.translate(car.x, car.y);
      context.fillStyle = '#071421'; context.fillRect(-car.width * .56, -car.height * .34, car.width * 1.12, car.height * .68);
      context.fillStyle = color; context.beginPath(); context.roundRect(-car.width / 2, -car.height / 2, car.width, car.height, 14); context.fill();
      context.fillStyle = '#bce9ff'; context.beginPath(); context.roundRect(-car.width * .32, -car.height * .28, car.width * .64, car.height * .27, 7); context.fill();
      context.fillStyle = '#fff4b8'; context.fillRect(-car.width * .34, -car.height * .48, car.width * .18, 7); context.fillRect(car.width * .16, -car.height * .48, car.width * .18, 7);
      context.restore();
    }

    function drawMotorcycle(bike, alpha = 1) {
      const lean = bike.lean;
      const jumpHeight = bike.jumpHeight || 0;
      context.save(); context.globalAlpha = alpha; context.translate(bike.x, bike.y);
      context.fillStyle = `rgba(15, 24, 34, ${0.72 - jumpHeight / 220})`; context.beginPath(); context.ellipse(-lean * 11 + 7, 7, 28 + jumpHeight * .08, 56 + jumpHeight * .05, 0, 0, Math.PI * 2); context.fill();
      context.translate(0, -jumpHeight * .16); context.scale(1 + jumpHeight / 430, 1 + jumpHeight / 430); context.rotate(lean * 0.24);
      context.fillStyle = '#05080c'; context.beginPath(); context.roundRect(-9, -55, 18, 20, 8); context.roundRect(-9, 39, 18, 20, 8); context.fill();
      context.fillStyle = '#bf1734'; context.beginPath(); context.roundRect(-27, -43, 54, 86, 22); context.fill();
      context.fillStyle = '#ed2f4d';
      context.beginPath(); context.moveTo(-27, -32); context.quadraticCurveTo(-32, -51, -9, -58); context.lineTo(9, -58); context.quadraticCurveTo(32, -51, 27, -32); context.lineTo(24, 21); context.quadraticCurveTo(19, 49, 0, 54); context.quadraticCurveTo(-19, 49, -24, 21); context.closePath(); context.fill();
      context.fillStyle = '#f84a61'; context.beginPath(); context.roundRect(-31, -20, 12, 52, 6); context.roundRect(19, -20, 12, 52, 6); context.fill();
      context.fillStyle = '#871126'; context.beginPath(); context.roundRect(-19, 22, 38, 25, 12); context.fill();
      context.fillStyle = '#1b2530'; context.beginPath(); context.ellipse(0, -4, 18, 27, 0, 0, Math.PI * 2); context.fill();
      context.fillStyle = '#f2c7a5'; context.beginPath(); context.arc(0, -18, 9, 0, Math.PI * 2); context.fill();
      context.fillStyle = '#e8edf2'; context.beginPath(); context.arc(0, -20, 11, Math.PI, Math.PI * 2); context.fill();
      context.fillStyle = '#8edfff'; context.beginPath(); context.roundRect(-9, -25, 18, 6, 3); context.fill();
      context.strokeStyle = '#e7edf2'; context.lineWidth = 4; context.lineCap = 'round'; context.beginPath(); context.moveTo(-22, -29); context.lineTo(22, -29); context.stroke();
      context.fillStyle = '#ffe06a'; context.beginPath(); context.roundRect(-12, -44, 24, 8, 4); context.fill();
      context.fillStyle = '#fff'; context.fillRect(-27, 4, 7, 17); context.fillRect(20, 4, 7, 17);
      context.fillStyle = '#8b1024'; context.beginPath(); context.arc(-24, 36, 5, 0, Math.PI * 2); context.arc(24, 36, 5, 0, Math.PI * 2); context.fill();
      context.restore();
    }

    function render() {
      context.setTransform(scale, 0, 0, scale, (width - 1000 * scale) / 2, (height - 700 * scale) / 2);
      const sky = context.createLinearGradient(0, 0, 0, 700); sky.addColorStop(0, '#82d8ff'); sky.addColorStop(1, '#d8f5ff'); context.fillStyle = sky; context.fillRect(-500, 0, 2000, 700);
      context.fillStyle = '#78bd68'; context.fillRect(0, 0, 1000, 700);
      context.fillStyle = '#e8d8b0'; context.fillRect(225, 0, 550, 700);
      context.fillStyle = '#334354'; context.fillRect(250, 0, 500, 700);
      context.strokeStyle = '#f8edbd'; context.lineWidth = 8; context.setLineDash([70, 80]); context.lineDashOffset = state.roadOffset;
      for (const x of [425, 575]) { context.beginPath(); context.moveTo(x, -100); context.lineTo(x, 800); context.stroke(); }
      context.setLineDash([]);
      for (let y = -80 + state.roadOffset; y < 760; y += 150) {
        context.fillStyle = '#fff'; context.fillRect(220, y, 15, 72); context.fillRect(765, y, 15, 72);
      }
      for (const obstacle of state.obstacles) drawCar(obstacle, `hsl(${obstacle.hue} 72% 55%)`);
      const blink = state.player.invulnerable > 0 && Math.floor(state.player.invulnerable * 10) % 2 === 0;
      drawMotorcycle(state.player, blink ? 0.3 : 1);
      context.fillStyle = '#ffd166'; for (const p of state.particles) { context.globalAlpha = Math.max(0, p.life * 2); context.fillRect(p.x - 5, p.y - 5, 10, 10); } context.globalAlpha = 1;
      telemetry.textContent = `Score ${Math.floor(state.score)} · ${'♥'.repeat(state.lives)}${'♡'.repeat(3 - state.lives)} · ${Math.round(state.speed)} km/h`;
      context.setTransform(1, 0, 0, 1, 0, 0);
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      if (!testingMode) update(dt);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function connect() {
      socket = new WebSocket('ws://127.0.0.1:17604');
      socket.onopen = () => { status.textContent = 'AirPods stream connected'; status.dataset.connected = 'true'; };
      socket.onclose = () => { status.textContent = 'Waiting for PodsInput…'; status.dataset.connected = 'false'; setTimeout(connect, 1000); };
      socket.onmessage = event => {
        const message = JSON.parse(event.data);
        if (message.protocolVersion !== 1 || message.type !== 'motion') return;
        const degrees = message.orientation.roll * 180 / Math.PI;
        tilt = Math.abs(degrees) < 3 ? 0 : Math.max(-1, Math.min(1, degrees / 24));
        const now = performance.now();
        const pitch = message.orientation.pitch * 180 / Math.PI;
        pitchHistory.push({ now, pitch });
        while (pitchHistory.length > 1 && now - pitchHistory[0].now > 220) pitchHistory.shift();
        pitchDelta = pitch - pitchHistory[0].pitch;
        pitchDeltaRange.min = Math.min(pitchDeltaRange.min, pitchDelta);
        pitchDeltaRange.max = Math.max(pitchDeltaRange.max, pitchDelta);
        if (pitchDelta < -2.5) { jump(); pitchHistory.length = 0; }
      };
    }
    connect();

    centerButton.addEventListener('click', () => {
      if (socket?.readyState !== WebSocket.OPEN) return;
      tilt = 0; status.textContent = 'Centering… hold still';
      socket.send(JSON.stringify({ protocolVersion: 1, type: 'calibrate' }));
    });
    startButton.addEventListener('click', resetGame);
    fullscreenButton.addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
    addEventListener('keydown', event => {
      keys.add(event.key);
      if (event.key === 'Enter' && state.mode !== 'playing') resetGame();
      if (event.code === 'Space') { event.preventDefault(); jump(); }
      if (event.key.toLowerCase() === 'f') fullscreenButton.click();
    });
    addEventListener('keyup', event => keys.delete(event.key));

    window.render_game_to_text = () => JSON.stringify({
      coordinateSystem: 'logical 1000x700; origin top-left; x right; y down', mode: state.mode,
      player: { type: 'motorcycle', x: +state.player.x.toFixed(1), y: state.player.y, lean: +state.player.lean.toFixed(2), jumpHeight: +(state.player.jumpHeight || 0).toFixed(1), jumpCooldown: +state.player.jumpCooldown.toFixed(2), invulnerable: +state.player.invulnerable.toFixed(2) },
      obstacles: state.obstacles.map(o => ({ x: o.x, y: +o.y.toFixed(1) })), score: Math.floor(state.score),
      best: state.best, lives: state.lives, clears: state.clears, jumps: state.jumps, speed: Math.round(state.speed), tilt: +tilt.toFixed(2),
      connected: socket?.readyState === WebSocket.OPEN, pitchDelta: +pitchDelta.toFixed(2),
      pitchDeltaRange: { min: +pitchDeltaRange.min.toFixed(2), max: +pitchDeltaRange.max.toFixed(2) }, fullscreen: Boolean(document.fullscreenElement)
    });
    window.advanceTime = ms => {
      testingMode = true;
      tilt = 0;
      const steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (let i = 0; i < steps; i++) update(1 / 60);
      render();
    };
  </script>
</body>
</html>
