<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PodsInput Tilt Rush</title>
  <style>
    :root { color-scheme: dark; font-family: ui-rounded, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #09051a; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .topbar { position: fixed; z-index: 2; inset: 20px 20px auto; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
    .panel { padding: 11px 15px; border: 1px solid #ffffff70; border-radius: 14px; background: #11243dcc; box-shadow: 0 8px 30px #08213c35; backdrop-filter: blur(12px); }
    #status[data-connected="true"] { color: #72f1b8; }
    button { min-height: 40px; padding: 8px 13px; border: 1px solid #ffffff55; border-radius: 9px; background: #ffffff18; color: inherit; font: inherit; font-weight: 700; cursor: pointer; pointer-events: auto; }
    button:hover { background: #ffffff2b; transform: translateY(-1px); }
    .actions { display: flex; gap: 8px; margin-top: 9px; }
    .menu { position: fixed; z-index: 1; inset: 0; display: grid; place-items: center; background: #07172766; }
    .menu[hidden] { display: none; }
    .card { width: min(440px, calc(100vw - 40px)); padding: 30px; border: 1px solid #ffffff80; border-radius: 24px; background: #10233eee; box-shadow: 0 24px 80px #06142666; text-align: center; }
    .card h1 { margin: 0 0 8px; font-size: clamp(38px, 7vw, 64px); letter-spacing: -0.05em; }
    .card p { color: #d9eaff; line-height: 1.55; }
    #start { min-width: 180px; padding: 12px 20px; background: #ff496d; border-color: #ffb3c1; font-size: 17px; }
    kbd { padding: 2px 7px; border: 1px solid #ffffff42; border-radius: 6px; background: #ffffff12; }
    #telemetry { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Tilt Rush racing game"></canvas>
  <div class="topbar">
    <div class="panel"><strong>Tilt Rush</strong><br><span id="status">Connecting…</span><div class="actions"><button id="center" type="button">Center</button><button id="fullscreen" type="button">Full screen</button></div></div>
    <div class="panel" id="telemetry">Score 0 · ♥♥♥</div>
  </div>
  <div class="menu" id="menu">
    <div class="card">
      <h1>Tilt Rush</h1>
      <p id="message">Tilt to carve. Flick your head up to jump traffic.<br>Survive longer as the road speeds up.</p>
      <p><kbd>←</kbd> <kbd>→</kbd> steer · <kbd>Space</kbd> jump · <kbd>F</kbd> fullscreen</p>
      <button id="start" type="button">Start run</button>
    </div>
  </div>
  <script>
    const canvas = document.querySelector('#game');
    const context = canvas.getContext('2d');
    const status = document.querySelector('#status');
    const telemetry = document.querySelector('#telemetry');
    const centerButton = document.querySelector('#center');
    const fullscreenButton = document.querySelector('#fullscreen');
    const menu = document.querySelector('#menu');
    const message = document.querySelector('#message');
    const startButton = document.querySelector('#start');
    const bikeImage = new Image();
    bikeImage.src = 'assets/light-cycle-v1.png';
    const cityImage = new Image();
    cityImage.src = 'assets/cyber-city-v2.webp';
    const roadImage = new Image();
    roadImage.src = 'assets/wet-asphalt-v1.webp';
    const levels = [
      { name: 'Straight Start', length: 2600, curve: 'straight' },
      { name: 'Soft Bends', length: 3400, curve: 'gentle' },
      { name: 'Night Esses', length: 4200, curve: 'esses' },
      { name: 'Hairpin District', length: 5200, curve: 'hairpin' }
    ];
    const trafficTypes = [
      { name: 'Model 3', src: 'assets/traffic/model-3.png', width: 54, height: 112 },
      { name: 'Model Y', src: 'assets/traffic/model-y.png', width: 58, height: 112 },
      { name: 'Cybercab', src: 'assets/traffic/cybercab.png', width: 54, height: 116 },
      { name: 'Cybertruck', src: 'assets/traffic/cybertruck.png', width: 58, height: 126 }
    ];
    for (const traffic of trafficTypes) { traffic.image = new Image(); traffic.image.src = traffic.src; }
    const keys = new Set();
    const spawnPattern = [1, 0, 2, 1, 2, 0, 1, 0, 2];
    let width = 0;
    let height = 0;
    let scale = 1;
    let socket;
    let tilt = 0;
    var pitchDelta = 0;
    let pitchDeltaRange = { min: 0, max: 0 };
    const pitchHistory = [];
    let testingMode = false;
    let lastFrame = performance.now();

    const state = {
      mode: 'ready', score: 0, best: Number(localStorage.getItem('podsinput-best') || 0), lives: 3, clears: 0, jumps: 0,
      elapsed: 0, speed: 260, spawnTimer: 1.1, spawnIndex: 0, roadOffset: 0, level: 0, previousLevel: 0, levelBlend: 1, levelDistance: 0, totalDistance: 0, levelFlash: 0,
      player: { x: 500, y: 590, width: 30, height: 104, lean: 0, jumpRemaining: 0, jumpCooldown: 0, invulnerable: 0 }, obstacles: [], particles: [], energyTrail: [], trailTimer: 0
    };

    function resize() {
      width = canvas.width = innerWidth * devicePixelRatio;
      height = canvas.height = innerHeight * devicePixelRatio;
      scale = Math.min(width / 1000, height / 700);
    }
    addEventListener('resize', resize);
    resize();

    function resetGame() {
      Object.assign(state, { mode: 'playing', score: 0, lives: 3, clears: 0, jumps: 0, elapsed: 0, speed: 260, spawnTimer: 1.1, spawnIndex: 0, roadOffset: 0, level: 0, previousLevel: 0, levelBlend: 1, levelDistance: 0, totalDistance: 0, levelFlash: 2.2, obstacles: [], particles: [], energyTrail: [], trailTimer: 0 });
      Object.assign(state.player, { x: 500, y: 590, lean: 0, jumpRemaining: 0, jumpCooldown: 0, invulnerable: 0 });
      menu.hidden = true;
      render();
    }

    function finishGame() {
      state.mode = 'gameover';
      state.best = Math.max(state.best, Math.floor(state.score));
      localStorage.setItem('podsinput-best', state.best);
      message.innerHTML = `Run over — <strong>${Math.floor(state.score)}</strong> points.<br>Best score: ${state.best}`;
      startButton.textContent = 'Race again';
      menu.hidden = false;
    }

    function spawnObstacle() {
      const laneIndex = spawnPattern[state.spawnIndex++ % spawnPattern.length];
      const type = (state.spawnIndex - 1) % trafficTypes.length;
      const traffic = trafficTypes[type];
      const y = -110;
      state.obstacles.push({ x: roadCenter(y) + (laneIndex - 1) * 150, y, width: traffic.width, height: traffic.height, type, laneIndex });
    }

    function levelRoadCenter(levelIndex, y) {
      const travel = state.totalDistance;
      const curve = levels[levelIndex].curve;
      if (curve === 'straight') return 500;
      if (curve === 'gentle') return 500 + Math.sin((y + travel) / 260) * 30;
      if (curve === 'esses') return 500 + Math.sin((y + travel) / 180) * 48 + Math.sin((y + travel) / 330 + 1.1) * 15;
      return 500 + Math.sin((y + travel) / 225) * 102 + Math.sin((y + travel) / 480 + .8) * 18;
    }

    function roadCenter(y) {
      const previous = levelRoadCenter(state.previousLevel, y);
      const current = levelRoadCenter(state.level, y);
      const blend = state.levelBlend * state.levelBlend * (3 - 2 * state.levelBlend);
      return previous + (current - previous) * blend;
    }

    function overlaps(a, b) {
      return Math.abs(a.x - b.x) < (a.width + b.width) * 0.43 && Math.abs(a.y - b.y) < (a.height + b.height) * 0.43;
    }

    function crash(obstacle) {
      state.lives -= 1;
      state.player.invulnerable = 1.2;
      for (let i = 0; i < 18; i++) state.particles.push({ x: state.player.x, y: state.player.y, vx: (i % 6 - 2.5) * 55, vy: -40 - (i % 4) * 25, life: 0.55 });
      obstacle.hit = true;
      if (state.lives <= 0) finishGame();
    }

    function jump() {
      if (state.mode !== 'playing' || state.player.jumpRemaining > 0 || state.player.jumpCooldown > 0) return;
      state.player.jumpRemaining = 0.85;
      state.player.jumpCooldown = 1.1;
      state.jumps += 1;
    }

    function update(dt) {
      if (state.mode !== 'playing') return;
      state.elapsed += dt;
      state.score += dt * (12 + state.speed / 55);
      state.speed = Math.min(560, 260 + state.elapsed * 10);
      state.totalDistance += state.speed * dt;
      state.levelDistance += state.speed * dt;
      state.levelFlash = Math.max(0, state.levelFlash - dt);
      state.levelBlend = Math.min(1, state.levelBlend + dt / 2);
      const currentLevel = levels[state.level];
      if (state.levelDistance >= currentLevel.length) {
        state.levelDistance -= currentLevel.length;
        state.previousLevel = state.level;
        state.level = Math.min(state.level + 1, levels.length - 1);
        state.levelBlend = 0;
        state.levelFlash = 2.2;
      }
      state.roadOffset = (state.roadOffset + state.speed * dt) % 150;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnObstacle();
        state.spawnTimer += Math.max(0.68, 1.25 - state.elapsed * 0.007);
      }

      const keyboard = (keys.has('ArrowRight') ? 1 : 0) - (keys.has('ArrowLeft') ? 1 : 0);
      const steering = keyboard || tilt;
      const playerRoadCenter = roadCenter(state.player.y);
      state.player.x = Math.max(playerRoadCenter - 210, Math.min(playerRoadCenter + 210, state.player.x + steering * 330 * dt));
      state.player.lean += (steering - state.player.lean) * Math.min(1, dt * 8);
      state.player.invulnerable = Math.max(0, state.player.invulnerable - dt);
      state.player.jumpRemaining = Math.max(0, state.player.jumpRemaining - dt);
      state.player.jumpCooldown = Math.max(0, state.player.jumpCooldown - dt);
      const jumpProgress = state.player.jumpRemaining > 0 ? 1 - state.player.jumpRemaining / 0.85 : 0;
      const jumpHeight = state.player.jumpRemaining > 0 ? Math.sin(jumpProgress * Math.PI) * 90 : 0;
      state.player.jumpHeight = jumpHeight;
      state.trailTimer -= dt;
      if (state.trailTimer <= 0) {
        state.energyTrail.push({ x: state.player.x - state.player.lean * 5, y: state.player.y + 45, life: .58 });
        state.trailTimer = .035;
      }
      for (const point of state.energyTrail) { point.y += state.speed * dt * .34; point.life -= dt; }
      state.energyTrail = state.energyTrail.filter(point => point.life > 0 && point.y < 760);

      for (const obstacle of state.obstacles) {
        obstacle.y += state.speed * dt;
        obstacle.x = roadCenter(obstacle.y) + (obstacle.laneIndex - 1) * 150;
        if (!obstacle.hit && !obstacle.jumped && overlaps(state.player, obstacle)) {
          if (jumpHeight > 24) {
            if (!obstacle.jumped) { obstacle.jumped = true; state.clears += 1; state.score += 25; }
          } else if (state.player.invulnerable === 0) {
            crash(obstacle);
          }
        }
      }
      state.obstacles = state.obstacles.filter(obstacle => obstacle.y < 790 && !obstacle.hit);
      for (const particle of state.particles) {
        particle.x += particle.vx * dt; particle.y += particle.vy * dt; particle.life -= dt;
      }
      state.particles = state.particles.filter(particle => particle.life > 0);
    }

    function drawCar(car, alpha = 1) {
      const traffic = trafficTypes[car.type];
      context.save(); context.globalAlpha = alpha; context.translate(car.x, car.y);
      context.fillStyle = '#0009'; context.beginPath(); context.ellipse(4, 8, car.width * .52, car.height * .48, 0, 0, Math.PI * 2); context.fill();
      if (traffic.image.complete && traffic.image.naturalWidth) {
        context.drawImage(traffic.image, -car.width / 2, -car.height / 2, car.width, car.height);
      } else {
        context.fillStyle = '#b6c4dc'; context.beginPath(); context.roundRect(-car.width / 2, -car.height / 2, car.width, car.height, 12); context.fill();
      }
      context.restore();
    }

    function drawCyberCity() {
      context.fillStyle = '#080811'; context.fillRect(0, 0, 1000, 700);
      if (!cityImage.complete || !cityImage.naturalWidth) return;
      const offset = (state.elapsed * 72) % 1500;
      context.globalAlpha = .84;
      context.drawImage(cityImage, 0, offset - 1500, 1000, 1500);
      context.drawImage(cityImage, 0, offset, 1000, 1500);
      context.globalAlpha = 1;
      const veil = context.createLinearGradient(0, 0, 1000, 0);
      veil.addColorStop(0, '#05051022'); veil.addColorStop(.5, '#0b0a1900'); veil.addColorStop(1, '#05051022');
      context.fillStyle = veil; context.fillRect(0, 0, 1000, 700);
    }

    function traceRoadEdge(offset) {
      context.beginPath();
      for (let y = -40; y <= 740; y += 20) {
        const x = roadCenter(y) + offset;
        if (y === -40) context.moveTo(x, y); else context.lineTo(x, y);
      }
    }

    function traceRoadSurface() {
      context.beginPath();
      for (let y = -40; y <= 740; y += 20) context.lineTo(roadCenter(y) - 250, y);
      for (let y = 740; y >= -40; y -= 20) context.lineTo(roadCenter(y) + 250, y);
      context.closePath();
    }

    function drawMotorcycle(bike, alpha = 1) {
      const lean = bike.lean;
      const jumpHeight = bike.jumpHeight || 0;
      context.save(); context.globalAlpha = alpha; context.translate(bike.x, bike.y);
      context.fillStyle = `rgba(15, 24, 34, ${0.68 - jumpHeight / 230})`; context.beginPath(); context.ellipse(-lean * 9 + 5, 8, 19 + jumpHeight * .07, 54 + jumpHeight * .04, 0, 0, Math.PI * 2); context.fill();
      context.translate(0, -jumpHeight * .16); context.scale(1 + jumpHeight / 430, 1 + jumpHeight / 430); context.rotate(lean * 0.24);
      if (bikeImage.complete && bikeImage.naturalWidth) {
        context.drawImage(bikeImage, -17, -67, 34, 134);
      } else {
        context.fillStyle = '#ed2f4d'; context.beginPath(); context.roundRect(-15, -58, 30, 116, 15); context.fill();
        context.fillStyle = '#ffe06a'; context.fillRect(-8, -52, 16, 7);
      }
      context.restore();
    }

    function drawEnergyTrail() {
      if (state.energyTrail.length < 2) return;
      context.save(); context.lineCap = 'round'; context.lineJoin = 'round'; context.shadowColor = '#ff3b24'; context.shadowBlur = 18;
      for (let index = 1; index < state.energyTrail.length; index++) {
        const from = state.energyTrail[index - 1]; const to = state.energyTrail[index];
        context.globalAlpha = Math.min(from.life, to.life) * 1.25;
        context.strokeStyle = '#ff4a2c'; context.lineWidth = 8;
        context.beginPath(); context.moveTo(from.x, from.y); context.lineTo(to.x, to.y); context.stroke();
        context.strokeStyle = '#ffd0a8'; context.lineWidth = 2; context.stroke();
      }
      context.restore();
    }

    function render() {
      context.setTransform(scale, 0, 0, scale, (width - 1000 * scale) / 2, (height - 700 * scale) / 2);
      drawCyberCity();
      context.save(); traceRoadSurface(); context.clip();
      if (roadImage.complete && roadImage.naturalWidth) {
        const roadTextureOffset = state.totalDistance % 1500;
        context.drawImage(roadImage, 0, roadTextureOffset - 1500, 1000, 1500);
        context.drawImage(roadImage, 0, roadTextureOffset, 1000, 1500);
      } else {
        context.fillStyle = '#1b1d26'; context.fillRect(0, 0, 1000, 700);
      }
      context.fillStyle = '#11152255'; context.fillRect(0, 0, 1000, 700); context.restore();
      context.shadowBlur = 0; context.strokeStyle = '#7d8794'; context.lineWidth = 6;
      traceRoadEdge(-250); context.stroke();
      traceRoadEdge(250); context.stroke();
      context.strokeStyle = '#c3c8d0bb'; context.lineWidth = 4; context.setLineDash([48, 102]); context.lineDashOffset = state.roadOffset;
      for (const laneOffset of [-75, 75]) { traceRoadEdge(laneOffset); context.stroke(); }
      context.setLineDash([]); context.shadowBlur = 0;
      for (let y = -80 + state.roadOffset; y < 760; y += 150) {
        context.fillStyle = '#d6a758'; context.fillRect(roadCenter(y) - 264, y, 5, 42);
        context.fillRect(roadCenter(y) + 259, y, 5, 42);
      }
      drawEnergyTrail();
      for (const obstacle of state.obstacles) drawCar(obstacle);
      const blink = state.player.invulnerable > 0 && Math.floor(state.player.invulnerable * 10) % 2 === 0;
      drawMotorcycle(state.player, blink ? 0.3 : 1);
      context.fillStyle = '#ffd166'; for (const p of state.particles) { context.globalAlpha = Math.max(0, p.life * 2); context.fillRect(p.x - 5, p.y - 5, 10, 10); } context.globalAlpha = 1;
      if (state.levelFlash > 0) {
        context.fillStyle = '#050711bb'; context.beginPath(); context.roundRect(360, 300, 280, 82, 18); context.fill();
        context.fillStyle = '#fff'; context.font = '700 16px system-ui'; context.textAlign = 'center'; context.fillText(`LEVEL ${state.level + 1}`, 500, 332);
        context.fillStyle = '#d6a758'; context.font = '800 23px system-ui'; context.fillText(levels[state.level].name, 500, 362); context.textAlign = 'start';
      }
      const levelProgress = Math.min(100, Math.floor(state.levelDistance / levels[state.level].length * 100));
      telemetry.textContent = `L${state.level + 1} ${levelProgress}% · ${Math.floor(state.score)} · ${'♥'.repeat(state.lives)}${'♡'.repeat(3 - state.lives)} · ${Math.round(state.speed)} km/h`;
      context.setTransform(1, 0, 0, 1, 0, 0);
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      if (!testingMode) update(dt);
      render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function connect() {
      socket = new WebSocket('ws://127.0.0.1:17604');
      socket.onopen = () => { status.textContent = 'AirPods stream connected'; status.dataset.connected = 'true'; };
      socket.onclose = () => { status.textContent = 'Waiting for PodsInput…'; status.dataset.connected = 'false'; setTimeout(connect, 1000); };
      socket.onmessage = event => {
        const message = JSON.parse(event.data);
        if (message.protocolVersion !== 1 || message.type !== 'motion') return;
        const degrees = message.orientation.roll * 180 / Math.PI;
        tilt = Math.abs(degrees) < 3 ? 0 : Math.max(-1, Math.min(1, degrees / 24));
        const now = performance.now();
        const pitch = message.orientation.pitch * 180 / Math.PI;
        pitchHistory.push({ now, pitch });
        while (pitchHistory.length > 1 && now - pitchHistory[0].now > 220) pitchHistory.shift();
        pitchDelta = pitch - pitchHistory[0].pitch;
        pitchDeltaRange.min = Math.min(pitchDeltaRange.min, pitchDelta);
        pitchDeltaRange.max = Math.max(pitchDeltaRange.max, pitchDelta);
        if (pitchDelta < -2.5) { jump(); pitchHistory.length = 0; }
      };
    }
    connect();

    centerButton.addEventListener('click', () => {
      if (socket?.readyState !== WebSocket.OPEN) return;
      tilt = 0; status.textContent = 'Centering… hold still';
      socket.send(JSON.stringify({ protocolVersion: 1, type: 'calibrate' }));
    });
    startButton.addEventListener('click', resetGame);
    fullscreenButton.addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
    addEventListener('keydown', event => {
      keys.add(event.key);
      if (event.key === 'Enter' && state.mode !== 'playing') resetGame();
      if (event.code === 'Space') { event.preventDefault(); jump(); }
      if (event.key.toLowerCase() === 'f') fullscreenButton.click();
    });
    addEventListener('keyup', event => keys.delete(event.key));

    window.render_game_to_text = () => JSON.stringify({
      coordinateSystem: 'logical 1000x700; origin top-left; x right; y down', mode: state.mode,
      player: { type: 'light-cycle', x: +state.player.x.toFixed(1), y: state.player.y, lean: +state.player.lean.toFixed(2), jumpHeight: +(state.player.jumpHeight || 0).toFixed(1), jumpCooldown: +state.player.jumpCooldown.toFixed(2), invulnerable: +state.player.invulnerable.toFixed(2), trailPoints: state.energyTrail.length },
      level: { number: state.level + 1, name: levels[state.level].name, distance: Math.floor(state.levelDistance), target: levels[state.level].length, roadBlend: +state.levelBlend.toFixed(2) }, roadCenterAtPlayer: +roadCenter(state.player.y).toFixed(1), obstacles: state.obstacles.map(o => ({ type: trafficTypes[o.type].name, lane: o.laneIndex, x: +o.x.toFixed(1), y: +o.y.toFixed(1) })), score: Math.floor(state.score),
      best: state.best, lives: state.lives, clears: state.clears, jumps: state.jumps, speed: Math.round(state.speed), tilt: +tilt.toFixed(2),
      connected: socket?.readyState === WebSocket.OPEN, pitchDelta: +pitchDelta.toFixed(2),
      pitchDeltaRange: { min: +pitchDeltaRange.min.toFixed(2), max: +pitchDeltaRange.max.toFixed(2) }, fullscreen: Boolean(document.fullscreenElement)
    });
    window.advanceTime = ms => {
      testingMode = true;
      tilt = 0;
      const steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (let i = 0; i < steps; i++) update(1 / 60);
      render();
    };
  </script>
</body>
</html>
